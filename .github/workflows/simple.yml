name: Simple App CI/CD Pipeline

on:
  push:
    branches:
      - 'main'

jobs:

  build:
    name: Build and Validate
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML file exists
        shell: powershell
        run: |
          if (Test-Path index.html) {
            Write-Host "✓ index.html found"
          } else {
            Write-Host "✗ index.html missing"
            exit 1
          }

  test:
    name: Test
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML content
        shell: powershell
        run: |
          if (Select-String -Pattern "NCG Africa" -Path index.html) {
            Write-Host "✓ Content check passed"
          } else {
            Write-Host "✗ Content check failed"
            exit 1
          }

  deploy:
    name: Deploy to Bank Server
    runs-on: [self-hosted]
    needs: [build, test]
    steps:
      - name: Pull latest code
        shell: powershell
        run: |
          if (!(Test-Path C:\simple-app)) { mkdir C:\simple-app }
          cd C:\simple-app
          if (!(Test-Path C:\simple-app\.git)) {
            git clone https://github.com/essiewakukha/simple-test.git .
          } else {
            git pull origin main
          }
          Write-Host "Deployment complete"

  validate:
    name: Post-Deploy Validation
    runs-on: [self-hosted]
    needs: deploy
    steps:
      - name: Verify deployment
        shell: powershell
        run: |
          if (Test-Path C:\simple-app\index.html) {
            Write-Host "OK: index.html deployed successfully"
          } else {
            Write-Host "FAILED: index.html not found"
            exit 1
          }