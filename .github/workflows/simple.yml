name: Simple App CI/CD Pipeline

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate HTML file exists
        run: |
          if [ -f index.html ]; then
            echo "PASS: index.html found"
          else
            echo "FAIL: index.html missing"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check HTML content
        run: |
          if grep -q "NCG Africa" index.html; then
            echo "PASS: Content check passed"
          else
            echo "FAIL: Content check failed"
            exit 1
          fi

  deploy:
    name: Deploy (${{ matrix.server }})
    needs: [build, test]
    strategy:
      fail-fast: false        # if one server fails, others keep going
      matrix:
        include:
          # ── Linux servers ──────────────────────────────
          - server: esther-HP-EliteBook-830-G5
            os: Linux
            runner: esther-HP-EliteBook-830-G5
            app_dir: ~/simple-app

          - server: server9
            os: Linux
            runner: server9
            app_dir: ~/simple-app

          # ── Windows servers ────────────────────────────
          - server: EC2AMAZ-CSKS18C
            os: Windows
            runner: EC2AMAZ-CSKS18C
            app_dir: C:\simple-app

          - server: EDGE-WIN
            os: Windows
            runner: EDGE-WIN
            app_dir: C:\simple-app

          - server: winvwm-oracle
            os: Windows
            runner: winvwm-oracle
            app_dir: C:\simple-app

    runs-on: ${{ matrix.runner }}
    steps:

      - name: Deploy (Linux)
        if: matrix.os == 'Linux'
        run: |
          APP_DIR="${{ matrix.app_dir }}"
          if [ ! -d "$APP_DIR" ]; then mkdir -p "$APP_DIR"; fi
          if [ ! -d "$APP_DIR/.git" ]; then
            git clone https://github.com/essiewakukha/simple-test.git "$APP_DIR"
          else
            cd "$APP_DIR" && git pull origin main
          fi
          echo "Deployment complete on ${{ matrix.server }}"

      - name: Deploy (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          $env:PATH += ";C:\Program Files\Git\cmd"
          $appDir = "${{ matrix.app_dir }}"

          # Fix dubious ownership — must run before any git command
          git config --global --add safe.directory "C:/simple-app"
          git config --global --add safe.directory "*"

          # If folder was created by a different user, remove and reclone
          if (Test-Path $appDir) {
            $acl = (Get-Acl $appDir).Owner
            $currentUser = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
            if ($acl -notlike "*$currentUser*") {
              Write-Host "Ownership mismatch detected, removing and recloning..."
              Remove-Item -Recurse -Force $appDir
            }
          }

          if (!(Test-Path $appDir)) {
            git clone https://github.com/essiewakukha/simple-test.git $appDir
          } else {
            cd $appDir
            git pull origin main
          }
          Write-Host "Deployment complete on ${{ matrix.server }}"

  validate:
    name: Validate (${{ matrix.server }})
    needs: deploy
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux servers ──────────────────────────────
          - server: esther-HP-EliteBook-830-G5
            os: Linux
            runner: esther-HP-EliteBook-830-G5
            app_dir: ~/simple-app

          - server: server9
            os: Linux
            runner: server9
            app_dir: ~/simple-app

          # ── Windows servers ────────────────────────────
          - server: EC2AMAZ-CSKS18C
            os: Windows
            runner: EC2AMAZ-CSKS18C
            app_dir: C:\simple-app

          - server: EDGE-WIN
            os: Windows
            runner: EDGE-WIN
            app_dir: C:\simple-app

          - server: winvwm-oracle
            os: Windows
            runner: winvwm-oracle
            app_dir: C:\simple-app

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Validate (Linux)
        if: matrix.os == 'Linux'
        run: |
          if [ -f "${{ matrix.app_dir }}/index.html" ]; then
            echo "PASS: index.html deployed on ${{ matrix.server }}"
          else
            echo "FAIL: index.html not found on ${{ matrix.server }}"
            exit 1
          fi

      - name: Validate (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path "${{ matrix.app_dir }}\index.html") {
            Write-Host "PASS: index.html deployed on ${{ matrix.server }}"
          } else {
            Write-Host "FAIL: index.html not found on ${{ matrix.server }}"
            exit 1
          }