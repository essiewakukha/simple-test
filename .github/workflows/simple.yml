name: Simple App CI/CD Pipeline

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate HTML file exists
        run: |
          if [ -f index.html ]; then
            echo "PASS: index.html found"
          else
            echo "FAIL: index.html missing"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check HTML content
        run: |
          if grep -q "NCG Africa" index.html; then
            echo "PASS: Content check passed"
          else
            echo "FAIL: Content check failed"
            exit 1
          fi

  deploy:
    name: Deploy (${{ matrix.server }})
    needs: [build, test]
    strategy:
      fail-fast: false        # if one server fails, others keep going
      matrix:
        include:
          # ── Linux servers ──────────────────────────────
          - server: linux-server-1
            os: Linux
            runner: [self-hosted, Linux, server-1]
            app_dir: ~/simple-app

          - server: linux-server-2
            os: Linux
            runner: [self-hosted, Linux, server-2]
            app_dir: ~/simple-app

          # ── Windows servers ────────────────────────────
          - server: windows-server-1
            os: Windows
            runner: [self-hosted, Windows, server-1]
            app_dir: C:\simple-app

          - server: windows-server-2
            os: Windows
            runner: [self-hosted, Windows, server-2]
            app_dir: C:\simple-app

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Install Git if missing (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          $gitPath = "C:\Program Files\Git\cmd"
          if (!(Test-Path "$gitPath\git.exe")) {
            Write-Host "Installing Git..."
            Invoke-WebRequest -Uri "https://github.com/git-for-windows/git/releases/download/v2.45.2.windows.1/Git-2.45.2-64-bit.exe" -OutFile "$env:TEMP\git-installer.exe"
            Start-Process -FilePath "$env:TEMP\git-installer.exe" -Args "/VERYSILENT /NORESTART /COMPONENTS=cmd" -Wait
            Write-Host "Git installed."
          } else {
            Write-Host "Git already present."
          }
          echo "C:\Program Files\Git\cmd" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Deploy (Linux)
        if: matrix.os == 'Linux'
        run: |
          APP_DIR="${{ matrix.app_dir }}"
          if [ ! -d "$APP_DIR" ]; then mkdir -p "$APP_DIR"; fi
          if [ ! -d "$APP_DIR/.git" ]; then
            git clone https://github.com/essiewakukha/simple-test.git "$APP_DIR"
          else
            cd "$APP_DIR" && git pull origin main
          fi
          echo "Deployment complete on ${{ matrix.server }}"

      - name: Install Git (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          if (!(Get-Command git -ErrorAction SilentlyContinue)) {
            Write-Host "Git not found, installing..."
            Invoke-WebRequest -Uri "https://github.com/git-for-windows/git/releases/download/v2.45.2.windows.1/Git-2.45.2-64-bit.exe" -OutFile "$env:TEMP\git-installer.exe"
            Start-Process -FilePath "$env:TEMP\git-installer.exe" -Args "/VERYSILENT /NORESTART" -Wait
            $env:PATH += ";C:\Program Files\Git\cmd"
            Write-Host "Git installed successfully"
          } else {
            Write-Host "Git already installed: $(git --version)"
          }

      - name: Deploy (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          $env:PATH += ";C:\Program Files\Git\cmd"
          $appDir = "${{ matrix.app_dir }}"
          if (!(Test-Path $appDir)) { mkdir $appDir }
          if (!(Test-Path "$appDir\.git")) {
            git clone https://github.com/essiewakukha/simple-test.git $appDir
          } else {
            cd $appDir
            git pull origin main
          }
          Write-Host "Deployment complete on ${{ matrix.server }}"

  validate:
    name: Validate (${{ matrix.server }})
    needs: deploy
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux servers ──────────────────────────────
          - server: linux-server-1
            os: Linux
            runner: [self-hosted, Linux, server-1]
            app_dir: ~/simple-app

          - server: linux-server-2
            os: Linux
            runner: [self-hosted, Linux, server-2]
            app_dir: ~/simple-app

          # ── Windows servers ────────────────────────────
          - server: windows-server-1
            os: Windows
            runner: [self-hosted, Windows, server-1]
            app_dir: C:\simple-app

          - server: windows-server-2
            os: Windows
            runner: [self-hosted, Windows, server-2]
            app_dir: C:\simple-app

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Validate (Linux)
        if: matrix.os == 'Linux'
        run: |
          if [ -f "${{ matrix.app_dir }}/index.html" ]; then
            echo "PASS: index.html deployed on ${{ matrix.server }}"
          else
            echo "FAIL: index.html not found on ${{ matrix.server }}"
            exit 1
          fi

      - name: Validate (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path "${{ matrix.app_dir }}\index.html") {
            Write-Host "PASS: index.html deployed on ${{ matrix.server }}"
          } else {
            Write-Host "FAIL: index.html not found on ${{ matrix.server }}"
            exit 1
          }