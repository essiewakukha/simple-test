name: Simple App CI/CD Pipeline

on:
  push:
    branches:
      - 'feature/simpletest-app'

jobs:

  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML file exists
        run: |
          if [ -f index.html ]; then
            echo "✓ index.html found"
          else
            echo "✗ index.html missing"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML content
        run: |
          if grep -q "NCG Africa" index.html; then
            echo "✓ Content check passed"
          else
            echo "✗ Content check failed"
            exit 1
          fi

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Deploy to Windows Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            powershell -Command "
              if (!(Test-Path C:\simple-app)) { mkdir C:\simple-app }
              cd C:\simple-app
              if (!(Test-Path C:\simple-app\.git)) {
                git clone https://github.com/NCG-Africa/EDGE-PLATFORM.git -b feature/simpletest-app .
              } else {
                git pull origin feature/simpletest-app
              }
              Write-Host 'Deployment complete'
            "

  validate:
    name: Post-Deploy Validation
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            powershell -Command "
              if (Test-Path C:\simple-app\index.html) {
                Write-Host 'OK: index.html deployed successfully'
              } else {
                Write-Host 'FAILED: index.html not found'
                exit 1
              }
            