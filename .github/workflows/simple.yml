name: Simple App CI/CD Pipeline

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML file exists
        run: |
          if [ -f index.html ]; then
            echo "PASS: index.html found"
          else
            echo "FAIL: index.html missing"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML content
        run: |
          if grep -q "NCG Africa" index.html; then
            echo "PASS: Content check passed"
          else
            echo "FAIL: Content check failed"
            exit 1
          fi

  deploy:
    name: Deploy to Bank Server
    runs-on: [self-hosted]
    needs: [build, test]
    steps:
      - name: Pull latest code (Linux)
        if: runner.os == 'Linux'
        run: |
          APP_DIR="$HOME/simple-app"
          if [ ! -d "$APP_DIR" ]; then
            mkdir -p "$APP_DIR"
          fi
          if [ ! -d "$APP_DIR/.git" ]; then
            git clone https://github.com/essiewakukha/simple-test.git "$APP_DIR"
          else
            cd "$APP_DIR" && git pull origin main
          fi
          echo "Deployment complete"

      - name: Pull latest code (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $appDir = "C:\simple-app"
          if (!(Test-Path $appDir)) { mkdir $appDir }
          if (!(Test-Path "$appDir\.git")) {
            git clone https://github.com/essiewakukha/simple-test.git $appDir
          } else {
            cd $appDir
            git pull origin main
          }
          Write-Host "Deployment complete"

  validate:
    name: Post-Deploy Validation
    runs-on: [self-hosted]
    needs: deploy
    steps:
      - name: Verify deployment (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ -f "$HOME/simple-app/index.html" ]; then
            echo "PASS: index.html deployed successfully"
          else
            echo "FAIL: index.html not found"
            exit 1
          fi

      - name: Verify deployment (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path C:\simple-app\index.html) {
            Write-Host "PASS: index.html deployed successfully"
          } else {
            Write-Host "FAIL: index.html not found"
            exit 1
          }