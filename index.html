<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCG Africa — Auth App</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0a0c10;
  }

  .wrapper {
    display: flex;
    width: 780px;
    min-height: 480px;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #1c2030;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }

  .sidebar {
    width: 260px;
    background: #0f1219;
    border-right: 1px solid #1c2030;
    padding: 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2.5rem;
  }

  .brand-icon {
    width: 32px;
    height: 32px;
    background: #185FA5;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .brand-name {
    font-size: 0.78rem;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .sidebar-heading {
    font-size: 0.7rem;
    font-weight: 600;
    color: #334155;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 0.85rem;
    color: #475569;
    cursor: default;
    margin-bottom: 2px;
  }

  .nav-item.active {
    background: #13192a;
    color: #93c5fd;
    border: 1px solid #1e2d45;
  }

  .nav-item .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #185FA5;
    flex-shrink: 0;
  }

  .nav-item .dot.gray { background: #334155; }

  .sidebar-footer {
    font-size: 0.72rem;
    color: #1e293b;
    line-height: 1.6;
    border-top: 1px solid #1c2030;
    padding-top: 1rem;
  }

  .main {
    flex: 1;
    background: #0d1117;
    padding: 2.5rem 2.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .eyebrow {
    font-size: 0.72rem;
    font-weight: 600;
    color: #185FA5;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h2 {
    font-size: 1.4rem;
    font-weight: 600;
    color: #e2e8f0;
    margin-bottom: 0.3rem;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 0.83rem;
    color: #334155;
    margin-bottom: 2rem;
  }

  .field { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    color: #475569;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 10px 13px;
    background: #0a0c10;
    border: 1px solid #1c2030;
    border-radius: 7px;
    color: #cbd5e1;
    font-size: 0.875rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  input::placeholder { color: #1e293b; }
  input:focus { border-color: #185FA5; }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 1.5rem;
    align-items: center;
  }

  button {
    flex: 1;
    padding: 10px;
    background: #185FA5;
    color: #e2e8f0;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
    font-family: inherit;
    letter-spacing: 0.02em;
    transition: background 0.15s;
  }

  button:hover { background: #1a6bbf; }
  button:active { background: #0f4a80; }

  .btn-secondary {
    flex: none;
    padding: 10px 16px;
    background: transparent;
    color: #475569;
    border: 1px solid #1c2030;
    border-radius: 7px;
    cursor: default;
    font-size: 0.875rem;
    font-family: inherit;
  }

  .message {
    font-size: 0.8rem;
    margin-top: 1rem;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 7px;
    color: #22c55e;
  }

  .message.error { color: #f87171; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2rem;
    padding-top: 1.25rem;
    border-top: 1px solid #1c2030;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }

  .status-text {
    font-size: 0.72rem;
    color: #334155;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="sidebar">
    <div>
      <div class="brand">
        <div class="brand-icon">🌍</div>
        <span class="brand-name">NCG Africa</span>
      </div>

      <div class="sidebar-heading">Access</div>
      <div class="nav-item active">
        <span class="dot"></span> Sign in
      </div>
      <div class="nav-item">
        <span class="dot gray"></span> Register
      </div>
      <div class="nav-item">
        <span class="dot gray"></span> Reset password
      </div>
    </div>

    <div class="sidebar-footer">
      Secure Access Portal<br>
      NCG Africa &copy; 2026 &mdash; v2.0
    </div>
  </div>

  <div class="main">
    <div class="eyebrow">Secure login</div>
    <h2>Welcome back</h2>
    <p class="subtitle">Enter your credentials to access the secure portal</p>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>

    <div class="btn-row">
      <button onclick="login()">Sign in</button>
      <div class="btn-secondary">SSO</div>
    </div>

    <p class="message" id="message"></p>

    <div class="status-bar">
      <div class="status-dot"></div>
      <span class="status-text">All systems operational &mdash; TLS 1.3 encrypted &mdash; Build v2.0</span>
    </div>

    <button onclick="showNotice()" style="margin-top:1rem; background:transparent; border:1px solid #1c2030; color:#475569; font-size:0.78rem; padding:8px 14px; border-radius:7px; cursor:pointer; width:100%;">
      🔔 Check for system notifications
    </button>
    <p id="notice" style="font-size:0.75rem; color:#334155; margin-top:0.5rem; text-align:center; min-height:16px;"></p>
  </div>

</div>

<script>
  function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('message');
    if (username === 'admin' && password === 'password123') {
      msg.className = 'message';
      msg.textContent = '✓ Login successful. Welcome, ' + username;
    } else {
      msg.className = 'message error';
      msg.textContent = '✗ Invalid credentials. Please try again.';
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  const notices = [
    'No new notifications.',
    'Scheduled maintenance: Sun 02:00 EAT.',
    'Password policy update effective Jul 1.',
    'All services running normally.'
  ];
  function showNotice() {
    const el = document.getElementById('notice');
    el.textContent = notices[Math.floor(Math.random() * notices.length)];
  }
</script>
</body>
</html>
