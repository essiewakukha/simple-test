<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCG Africa — Auth App</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0d0f14;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%);
  }

  .card {
    background: #13161e;
    border: 1px solid #1e2330;
    padding: 2.5rem;
    border-radius: 12px;
    width: 380px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.8rem;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 0.8rem;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  h2 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 0.4rem;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 0.875rem;
    color: #475569;
    margin-bottom: 2rem;
  }

  .field {
    margin-bottom: 1rem;
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: #64748b;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 11px 14px;
    background: #0d0f14;
    border: 1px solid #1e2330;
    border-radius: 6px;
    color: #e2e8f0;
    font-size: 0.9rem;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input::placeholder { color: #334155; }

  input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
  }

  button {
    width: 100%;
    padding: 11px;
    margin-top: 1.5rem;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    font-family: inherit;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.1s;
  }

  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.99); }

  .message {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.85rem;
    min-height: 20px;
    color: #22c55e;
  }

  .error { color: #f87171; }

  .divider {
    border: none;
    border-top: 1px solid #1e2330;
    margin: 1.8rem 0 1.2rem;
  }

  .footer {
    font-size: 0.75rem;
    color: #334155;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-icon">🌍</div>
    <span class="logo-text">NCG Africa</span>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your account to continue</p>

  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" />
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" />
  </div>

  <button onclick="login()">Sign in</button>
  <p class="message" id="message"></p>

  <hr class="divider">
  <p class="footer">NCG Africa Auth App &mdash; Secure Access Portal</p>
</div>

<script>
  function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('message');
    if (username === 'admin' && password === 'password123') {
      msg.className = 'message';
      msg.textContent = '✓ Login successful! Welcome, ' + username;
    } else {
      msg.className = 'message error';
      msg.textContent = '✗ Invalid username or password';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
